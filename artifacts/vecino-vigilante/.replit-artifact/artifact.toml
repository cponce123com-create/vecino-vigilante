kind = "web"
previewPath = "/"
title = "Vecino Vigilante Chanchamayo"
version = "1.0.0"
id = "artifacts/vecino-vigilante"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20976

[services.development]
run = "pnpm --filter @workspace/vecino-vigilante run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vecino-vigilante", "run", "build" ]
publicDir = "artifacts/vecino-vigilante/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20976"
BASE_PATH = "/"
